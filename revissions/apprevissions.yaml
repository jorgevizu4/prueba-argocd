apiVersion: argoproj.io/v1alpha1
kind: 
metadata:
  name: prueba-argocd-app
  namespace: argocd-prueba
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/jorgevizu4/prueba-argocd.git
    targetRevision: main
    path: charts/ejemplo-app
  destination:
    server: https://kubernetes.default.svc
    namespace: demo-argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true