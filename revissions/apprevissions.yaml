apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prueba-argocd-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/jorgevizu4/prueba-argocd
    path: manifest/apps/__overlays
    targetRevision: main
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true