image:
  tag: 26.3.1-debian-12-r1

auth:
  adminUser: admin
  adminPassword: jorgevizuete

keycloakConfigCli:
  enabled: true
  backoffLimit: 3
  configuration:
    demo-realm.yaml: |
      realm: demo
      enabled: true
      displayName: Demo Realm
      registrationAllowed: false
      resetPasswordAllowed: true

      roles:
        realm:
          - name: app-user
          - name: app-admin

      clients:
        - clientId: frontend-app
          name: Frontend App
          enabled: true
          protocol: openid-connect
          publicClient: true
          directAccessGrantsEnabled: true
          standardFlowEnabled: true
          redirectUris:
            - "http://localhost:3000/*"
          webOrigins:
            - "+"
          defaultClientScopes:
            - profile
            - email
            - roles
          optionalClientScopes:
            - offline_access

      clientScopes:
        - name: roles
          protocol: openid-connect

      users:
        - username: myuser
          enabled: true
          emailVerified: true
          firstName: Jorge
          lastName: Vizuete
          credentials:
            - type: password
              value: jorgevizuete
              temporary: false
          realmRoles:
            - app-user

      clientRoles:
        frontend-app:
          - name: read
          - name: write
          - name: admin
