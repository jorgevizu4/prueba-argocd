apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: keycloak
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: https://github.com/jorgevizu4/prueba-argocd
      path: charts/keycloak
      targetRevision: main
      helm:
        valueFiles:
          - $values/resources/apps/keycloak/values.yaml
    - repoURL: https://github.com/jorgevizu4/prueba-argocd
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: keycloak
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  revisionHistoryLimit: 3
