apiVersion: helm.toolkit.argoproj.io/v2
kind: HelmRelease
metadata:
  name: hipstershop
  namespace: argocd-prueba
spec:
  project: default
  sources:
    - repoURL: ./charts/hipstershop
      chart: hipstershop
      targetRevision: 0.1.0
      helm:
        valueFiles:
          - $values/resources/apps/hipstershop/values.yaml
    - repoURL:
      targetRevision: main
      ref: values  
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd-prueba
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - ApplyOutOfSyncOnly=true
      - RespectIgnoreDifferences=true
      - Replace=false
  revisionHistoryLimit: 3