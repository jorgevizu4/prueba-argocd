apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hipstershop
  namespace: demo-argocd
spec:
  project: default
  sources:
    - repoURL: charts/hipstershop
      chart: hipstershop
      targetRevision: 0.1.0
      helm:
        valueFiles:
          - $values/resources/apps/hipstershop/values.yaml
    - repoURL:
      targetRevision: main
      ref: values  
  destination:
    server: https://kubernetes.default.svc
    namespace: demo-argocd
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - ApplyOutOfSyncOnly=true
      - RespectIgnoreDifferences=true
      - Replace=false
  revisionHistoryLimit: 3