apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hipstershop
  namespace: demo-argocd
spec:
  project: default
  source:
    repoURL: https://github.com/jorgevizu4/prueba-argocd
    path: charts/hipstershop
    targetRevision: main
    helm:
      valueFiles:
        - $values/resources/apps/hipstershop/values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: demo-argocd
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - ApplyOutOfSyncOnly=true
      - RespectIgnoreDifferences=true
      - Replace=false
  revisionHistoryLimit: 3