apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ejemplo-app
  namespace: demo-argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/jorgevizu4/prueba-argocd
    path: charts/ejemplo-app
    targetRevision: main
    helm:
      valueFiles:
        - $values/resources/apps/ejemplo-app/values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: demo-argocd
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - ApplyOutOfSyncOnly=true
      - RespectIgnoreDifferences=true
      - Replace=false
  revisionHistoryLimit: 3