apiVersion: apps/v1
kind: Deployment
metadata:
  name: ejemplo-deployment
  namespace: argocd
  labels:
    app: ejemplo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ejemplo
  template:
    metadata:
      labels:
        app: ejemplo
    spec:
      containers:
      - name: nginx
        image: nginx:1.25.2
        ports:
        - containerPort: 80